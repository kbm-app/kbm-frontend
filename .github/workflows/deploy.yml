name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  deploy:
    # Self-hosted runner installed directly on the target VPS (see
    # deploy/DEPLOYMENT.md, step 10) — no SSH hop needed, this runs where the
    # containers already are.
    runs-on: [self-hosted, kbm]
    steps:
      - uses: actions/checkout@v4

      # node_modules/.next excluded — Next.js needs a fresh compile inside the
      # Docker image, not a copy of this checkout's own build output.
      - name: Sync to deploy directory
        run: |
          rsync -a --delete \
            --exclude='node_modules' \
            --exclude='.next' \
            --exclude='.git' \
            --exclude='.env' \
            --exclude='.env.local' \
            --exclude='tsconfig.tsbuildinfo' \
            ./ /var/www/kbm/kbm-frontend/

      # Next.js requires a compile step, so this is a rebuild, not just a restart.
      # NEXT_PUBLIC_API_URL is read from deploy/.env on the VPS at build time.
      - name: Rebuild and restart frontend
        run: |
          cd /var/www/kbm/deploy
          docker compose -p kbm --env-file .env up -d --build frontend
